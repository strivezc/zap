name: Build Zap for Windows

on:
  workflow_dispatch:  # 手动触发

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build release
      run: cargo build --release
      env:
        CARGO_FULL_PROFILE: release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: zap-windows-x64
        path: |
          target/release/warp.exe
          target/release/conpty.dll
          target/release/dxcompiler.dll
          target/release/dxil.dll
          target/release/msvcp140.dll
          target/release/vcruntime140.dll
          target/release/vcruntime140_1.dll
          target/release/x64/OpenConsole.exe
